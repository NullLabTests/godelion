<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7c948"/>
      <stop offset="100%" style="stop-color:#e8a317"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="100" x2="1280" y2="100"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="300" x2="1280" y2="300"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="500" x2="1280" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="640"/>
    <line x1="400" y1="0" x2="400" y2="640"/>
    <line x1="600" y1="0" x2="600" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="1000" y1="0" x2="1000" y2="640"/>
    <line x1="1200" y1="0" x2="1200" y2="640"/>
  </g>

  <!-- Glow effects -->
  <circle cx="640" cy="320" r="300" fill="#00d2ff" opacity="0.03"/>
  <circle cx="640" cy="320" r="200" fill="#f7c948" opacity="0.04"/>

  <!-- Abstract Ouroboros / Self-reference ring -->
  <path d="M 640 140 C 780 140, 880 230, 880 340 C 880 450, 780 520, 640 520 C 500 520, 400 450, 400 340 C 400 230, 500 140, 640 140"
        fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.5"/>
  <path d="M 640 120 C 800 120, 910 225, 910 340 C 910 455, 800 540, 640 540 C 480 540, 370 455, 370 340 C 370 225, 480 120, 640 120"
        fill="none" stroke="url(#cyan)" stroke-width="1.5" opacity="0.25"/>

  <!-- Code bracket decorations -->
  <text x="320" y="260" font-family="'Courier New', monospace" font-size="80" fill="url(#cyan)" opacity="0.08" font-weight="bold">&lt;/&gt;</text>
  <text x="880" y="440" font-family="'Courier New', monospace" font-size="80" fill="url(#gold)" opacity="0.08" font-weight="bold">{  }</text>
  <text x="220" y="500" font-family="'Courier New', monospace" font-size="40" fill="#00d2ff" opacity="0.05">def evolve():</text>
  <text x="980" y="180" font-family="'Courier New', monospace" font-size="40" fill="#f7c948" opacity="0.05">return self</text>

  <!-- Main title -->
  <text x="640" y="300" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="700" fill="url(#gold)" text-anchor="middle" letter-spacing="8">GODELION</text>

  <!-- Subtitle -->
  <text x="640" y="370" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" fill="url(#cyan)" text-anchor="middle" letter-spacing="4" opacity="0.9">Open-Ended Evolution of Self-Improving Coding Agents</text>

  <!-- Tagline -->
  <text x="640" y="430" font-family="'Courier New', monospace" font-size="18" fill="#ffffff" text-anchor="middle" letter-spacing="3" opacity="0.4">Recursive Self-Improvement  •  Empirically Validated  •  Safely Sandboxed</text>

  <!-- Decorative bottom line -->
  <line x1="440" y1="465" x2="840" y2="465" stroke="url(#gold)" stroke-width="2" opacity="0.3"/>

  <!-- Badge-style indicators -->
  <rect x="420" y="490" rx="15" ry="15" width="160" height="35" fill="none" stroke="url(#cyan)" stroke-width="1" opacity="0.5"/>
  <text x="500" y="513" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#00d2ff" text-anchor="middle" opacity="0.8">🧬 Darwinian</text>

  <rect x="560" y="490" rx="15" ry="15" width="160" height="35" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <text x="640" y="513" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#f7c948" text-anchor="middle" opacity="0.8">🔄 Self-Improving</text>

  <rect x="700" y="490" rx="15" ry="15" width="160" height="35" fill="none" stroke="url(#cyan)" stroke-width="1" opacity="0.5"/>
  <text x="780" y="513" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#00d2ff" text-anchor="middle" opacity="0.8">🛡️ Sandboxed</text>

  <!-- Nodes / neural decoration -->
  <circle cx="160" cy="160" r="4" fill="#00d2ff" opacity="0.4"/>
  <circle cx="1120" cy="500" r="4" fill="#00d2ff" opacity="0.4"/>
  <circle cx="180" cy="500" r="3" fill="#f7c948" opacity="0.3"/>
  <circle cx="1100" cy="160" r="3" fill="#f7c948" opacity="0.3"/>

  <line x1="160" y1="160" x2="180" y2="500" stroke="#00d2ff" stroke-width="0.8" opacity="0.12"/>
  <line x1="1100" y1="160" x2="1120" y2="500" stroke="#00d2ff" stroke-width="0.8" opacity="0.12"/>
  <line x1="160" y1="160" x2="1100" y2="160" stroke="#00d2ff" stroke-width="0.8" opacity="0.08"/>
  <line x1="180" y1="500" x2="1120" y2="500" stroke="#00d2ff" stroke-width="0.8" opacity="0.08"/>
</svg>

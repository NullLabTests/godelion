[pytest]
testpaths = tests
python_files = test_*.py
asyncio_mode = auto
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    docker: marks tests that require Docker (deselect with '-m "not docker"')
    smoke: marks tests that require Docker/LLM mocks (run separately)

# Smoke tests require mocked Docker/LLM; exclude from default run to avoid
# polluting sys.modules for other test files.
addopts = --ignore=tests/test_smoke_v020.py
